kind = "web"
previewPath = "/"
title = "LegalAssist AI"
version = "1.0.0"
id = "artifacts/legal-assist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20938

[services.development]
run = "pnpm --filter @workspace/legal-assist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legal-assist", "run", "build" ]
publicDir = "artifacts/legal-assist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20938"
BASE_PATH = "/"
